<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Leyes del Perú — Archivo del Congreso de la República</title>
<meta name="description" content="Archivo consultable de la legislación peruana: leyes, resoluciones legislativas, decretos ley y más, ordenadas por año con filtros por tipo, número, texto y vigencia.">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="hero compacta">
  <h1>⚖ Leyes del Perú</h1>
  <p class="lema">Archivo consultable de la legislación peruana ·
  fuente: <a href="https://www.leyes.congreso.gob.pe/" target="_blank" rel="noopener">leyes.congreso.gob.pe</a></p>
  <div id="stats" class="stats">
    <div class="stat"><span id="st-total">…</span><label>normas</label></div>
    <div class="stat"><span id="st-rango">…</span><label>periodo</label></div>
    <div class="stat"><span id="st-tipos">…</span><label>tipos de norma</label></div>
    <div class="stat"><span id="st-act">…</span><label>actualizado</label></div>
  </div>
</header>

<section class="explica">
  <canvas id="grafico" height="150" title="Haz clic en una barra para filtrar ese año"></canvas>
</section>

<div id="filtros">
  <label>Tipo de norma
    <select id="f-tipo"><option value="">Todos</option></select>
  </label>
  <label>Año desde
    <select id="f-desde"><option value=""></option></select>
  </label>
  <label>Año hasta
    <select id="f-hasta"><option value=""></option></select>
  </label>
  <label>Número
    <input id="f-numero" type="text" placeholder="p. ej. 31000" size="10">
  </label>
  <label>Buscar en título / contenido
    <input id="f-texto" type="search" placeholder="p. ej. educación universitaria">
  </label>
  <label>Vigencia
    <select id="f-vigencia">
      <option value="">Todas</option>
      <option value="1">Sin observaciones</option>
      <option value="0">Con observaciones (derogadas, etc.)</option>
    </select>
  </label>
  <button id="btn-buscar">Buscar</button>
  <button id="btn-limpiar" class="sec">Limpiar</button>
</div>

<div id="resumen"></div>
<div id="lista"><p id="aviso">Cargando base de datos (varios MB, unos segundos)…</p></div>
<div id="paginacion">
  <button id="pag-ant">← Anterior</button>
  <span id="pag-info"></span>
  <button id="pag-sig">Siguiente →</button>
</div>

<footer>
  <p><a href="https://github.com/oprbguitar/ley" target="_blank" rel="noopener">github.com/oprbguitar/ley</a>
  · datos del Congreso de la República del Perú — verifica siempre el texto oficial en los enlaces.</p>
</footer>

<script src="app.js"></script>
</body>
</html>
